# 如果你想用 wrangler CLI 部署而不是网页粘贴：
#   npm i -g wrangler
#   wrangler login
#   wrangler deploy
#
# 然后给生产环境加 secret：
#   wrangler secret put GEMINI_API_KEY
#   wrangler secret put ALLOWED_ORIGINS

name = "gemini-proxy"
main = "gemini-proxy.js"
compatibility_date = "2025-01-01"
workers_dev = true

[vars]
# 非密钥环境变量。GEMINI_API_KEY 用 wrangler secret put 设。
# 多个 Origin 用逗号分隔
ALLOWED_ORIGINS = "https://your-user.github.io,https://your-custom-domain.com"

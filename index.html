<!-- 访问统计：根据 config.js 动态注入 -->
<script>
(function () {
  var cfg = window.PETGUIDE_CONFIG || {};
  // Umami
  if (cfg.umami && cfg.umami.websiteId) {
    var s = document.createElement('script');
    s.defer = true;
    s.src = cfg.umami.src;
    s.setAttribute('data-website-id', cfg.umami.websiteId);
    document.body.appendChild(s);
  }
  // GoatCounter（替代）
  if (cfg.goatCounter && cfg.goatCounter.code) {
    window.goatcounter = { endpoint: 'https://' + cfg.goatCounter.code + '.goatcounter.com/count' };
    var g = document.createElement('script');
    g.async = true;
    g.src = '//gc.zgo.at/count.js';
    g.setAttribute('data-goatcounter', window.goatcounter.endpoint);
    document.body.appendChild(g);
  }
})();
</script>
